<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="g" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="115" fill="#0b1320"/>
  <path d="M44 286 H168 L208 286 L256 96 L304 416 L344 286 H468"
        fill="none" stroke="#34d399" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#g)"/>
  <!-- 핑: 고점에서 퍼지는 링 -->
  <circle cx="256" cy="96" r="44" fill="none" stroke="#eafff7" stroke-width="6">
    <animate attributeName="r" values="44;112" dur="1.6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.6 0.3 1"/>
    <animate attributeName="opacity" values="0.85;0" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="6;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <!-- 박동: lub-dub 리듬으로 뛰는 점 -->
  <circle cx="256" cy="96" r="41" fill="#eafff7" filter="url(#g)">
    <animate attributeName="r" values="41;58;41;55;41;41" keyTimes="0;0.1;0.22;0.32;0.46;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
</svg>
